AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  facility-care-notification-service
  Serverless notification service for Facility Care platform

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Resources:
  NotificationHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: notification-handler/
      Handler: src/handlers/notificationHandler.lambdaHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          MONGODB_URI: '{{resolve:ssm:/facility-care/mongodb-uri}}'
          FROM_EMAIL: '{{resolve:ssm:/facility-care/from-email}}'
      Events:
        NotificationQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationQueue.Arn
            BatchSize: 10
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt NotificationQueue.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/facility-care/*'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - src/handlers/notificationHandler.ts

  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: facility-care-notification-queue
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationDLQ.Arn
        maxReceiveCount: 3

  NotificationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: facility-care-notification-dlq
      MessageRetentionPeriod: 1209600

Outputs:
  NotificationQueueUrl:
    Description: SQS Queue URL for Facility Care notifications
    Value: !Ref NotificationQueue
  NotificationDLQUrl:
    Description: Dead Letter Queue URL
    Value: !Ref NotificationDLQ
  NotificationHandlerFunction:
    Description: Notification Handler Lambda Function ARN
    Value: !GetAtt NotificationHandlerFunction.Arn
  NotificationHandlerFunctionIamRole:
    Description: IAM Role for Notification Handler
    Value: !GetAtt NotificationHandlerFunctionRole.Arn