AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  facility-care-notification-service

  Serverless notification service for Facility Care platform

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3

    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: notification-handler/
      Handler: src/handlers/notificationHandler.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
      - x86_64
      Events:
        NotificationQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationQueue.Arn
            BatchSize: 10
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt NotificationQueue.QueueName
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
        - src/handlers/notificationHandler.ts

  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: facility-care-notification-queue

  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: 'true'
Outputs:
  NotificationQueueUrl:
    Description: SQS Queue URL for Facility Care notifications
    Value: !Ref NotificationQueue
  NotificationHandlerFunction:
    Description: Notification Handler Lambda Function ARN
    Value: !GetAtt NotificationHandlerFunction.Arn
  NotificationHandlerFunctionIamRole:
    Description: IAM Role for Notification Handler
    Value: !GetAtt NotificationHandlerFunctionRole.Arn
